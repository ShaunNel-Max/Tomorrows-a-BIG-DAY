 Türkçe. Every chat message and AI nudge is auto-translated to each person's preferred language."},{q:"Who can see my events?",a:"Only the people you invite. Every event has its own private room — no public profiles, no friend graphs, no algorithmic feed. Private by default, end-to-end-encrypted in transit."},{q:"Can I use it for my company?",a:"Absolutely. Global brands use it for town halls, SKOs, off-sites, work milestones and onboarding — write once and every employee reads it in their own language. See the 'For global teams' section above."},{q:"How do RSVPs work?",a:"Send a single invite via WhatsApp, iMessage, email or whatever your country uses. Replies, RSVPs and follow-ups all land in the event's private chat room — no bouncing between apps."},{q:"Are messages and chats really free, even when chatting internationally?",a:"Yes. Every chat in the app — event groups, family threads, sports squad rooms and one-to-one secure-invite replies — runs over data (Wi-Fi or mobile) and is always free for both sender and receiver. There are no SMS rates, no roaming bills and no per-message charges, ever, no matter which countries the two of you are in. The only time we ever pay a carrier fee is the very first SMS or email when you invite someone who doesn't yet have the app installed; once they install, every message after that switches to free push notifications."},{q:"How do I know if it's a good time to message someone?",a:"Every group chat shows a small live strip at the top — for example, '👥 In this chat — Carla 14:32 · Tom 09:15 · You 21:48' — so before you fire off a message you can see at a glance whether it's mid-afternoon for them or the middle of the night. The clocks re-tick every minute and respect each member's actual phone timezone. For one-to-one threads (replies to a secure invite), the host sees the same recipient-time read-out in their inbox view."},{q:"Do I have to re-type all my events from my old calendar?",a:"No. A built-in import wizard walks you through exporting your existing events from Google, Apple iCloud, Outlook, Yahoo, Eventbrite or Facebook (via Google) — then brings them across in one tap. You can even pre-set smart reminder defaults per event type before the import runs, so birthdays, weddings and work meetings each get the kind of nudge that suits them."},{q:"How exactly do I export my existing calendar so I can import it here?",a:`Every major calendar lets you download a single .ics file (sometimes called a 'calendar export' or 'iCalendar feed'). You don't need any technical know-how — once you have that file, the wizard inside Tomorrow's a BIG DAY does the rest in one tap. Step-by-step for each provider:

📅 Google Calendar (web)
1. Open calendar.google.com on a laptop or desktop browser.
2. Top-right gear icon → Settings → 'Import & export' (left sidebar).
3. Under 'Export', click the blue Export button — Google emails you a .zip with one .ics file per calendar.
4. Unzip and keep the .ics file(s) handy.

🍎 Apple iCloud Calendar (iPhone/iPad/Mac)
1. On a Mac: open Calendar app → File → Export → Export… → save the .ics file.
2. On iPhone/iPad: visit icloud.com in Safari → Calendar → click the 🔄 share icon next to the calendar name → 'Public Calendar' → copy the webcal:// link → paste into the import wizard (we fetch it for you, no file needed).

🪟 Microsoft Outlook (web or desktop)
1. Outlook.com: Calendar → Settings (gear icon) → 'View all Outlook settings' → Calendar → 'Shared calendars' → 'Publish a calendar' → choose your calendar → 'Publish' → copy the .ics URL.
2. Outlook desktop (Windows): File → Save Calendar → choose date range & detail level → save .ics.
3. Outlook on Mac: File → Export → Export to Archive File → tick 'Calendar' → save.

📨 Yahoo Calendar
1. calendar.yahoo.com → Settings (gear icon, top-right) → 'Account information' → Calendar → 'Export calendar' → download .ics.

🎟️ Eventbrite (your tickets)
1. eventbrite.com → Tickets → tap any order → 'Add to calendar' link gives you an .ics file per event.
2. For all tickets at once, open Account → 'Export my data' (GDPR export) and grab the calendar.ics inside the .zip.

👥 Facebook Events (via Google)
1. Facebook only exports events as a webcal:// feed: Settings & privacy → Settings → Apps and websites → 'Calendar' → copy the export URL.
2. Easiest path: subscribe that URL inside Google Calendar first ('Other calendars' → 'From URL'), wait a minute for events to appear, then export from Google as above.

Once you have the .ics file or webcal:// link:
1. Open Tomorrow's a BIG DAY → Settings → 'Import calendar'.
2. Upload the .ics or paste the link.
3. Tick which event types you want (birthdays, work, sports…) and set the default reminder timeline for each — see the next FAQ for the smart defaults.
4. Tap 'Bring them across' — every event lands instantly with the right colour, emoji and reminder schedule already applied.

You can re-run the wizard any time to pull in newly added events, and nothing is ever uploaded to a third-party server — the .ics is parsed entirely on your device.`},{q:"What reminders do imported events come with?",a:`Every import is paired with a built-in notification system — you don't have to set a single alarm by hand. Each event type ships with its own pre-designed timeline (you can change any of these in the wizard before you import, on a per-event basis afterwards, or in one tap across every imported event from Settings → Group-adjust reminders):

• 🎂 Birthday — 1 week before · 09:00, then 1 day before · 09:00
• 💍 Wedding — 1 month before · 09:00, then 1 week before · 09:00
• 💞 Anniversary — 1 week before · 09:00, then 1 day before · 09:00
• 🕊️ Memorial — 1 week before · 09:00
• 💼 Work — 1 day before · 09:00
• ⚽ Sports — 1 day before · 18:00
• 🌴 Holiday — off by default (toggle on if you want one)
• ✈️ Travel — 1 week before · 09:00, then 1 day before · 18:00
• 📌 Other — 1 day before · 09:00

Group-adjust lets you say 'remind me 2 weeks before AND 1 day before, both at 08:00' once and have it applied across every future event you own. You can also dial it in per type — e.g. only re-time birthdays. The dialog states up-front that this overwrites the reminder times on matching events, so any per-event customisations you've made will be replaced; turn the second reminder off and you'll clear that slot on every matching event in one go.

For events created by someone else (RSVPs you've accepted, family invites, work meetings hosted by a colleague), the host's reminder times are read-only — you can't override what they set for everyone — but you can layer your own personal nudges on top from the event screen, and those stay private to you.`},{q:"How do wallpapers and the AI image upscaler work — and do I have to pay each time I use one?",a:`No. Once a wallpaper is in your gallery, it's yours forever — you never pay for it again, no matter how often you re-use it on the calendar, on event tiles or as a phone background.

Here's the pricing in plain English:

• 🎁 Your first 3 wallpaper saves are free. That covers anything you put in the gallery — uploading your own photo, picking one of our themed designs, generating a brand-new image with the AI prompt, or running a photo through the AI upscaler for sharper detail.
• 💵 From the 4th save onwards it's $1 each — a one-off, one-time charge for that single image. There is no subscription, no monthly wallpaper fee, and no hidden re-charge later.
• 🖼️ Once saved, it stays in your gallery for as long as you want it there — it never expires and we never re-charge for it. Use it on January, swap it to June, share it across multiple events, even restore it from Trash months later: still no extra cost.

The in-app counter always shows how many free saves you have left and the exact $1 charge for the next one before you commit, so there are no surprises. If you only ever want the 3 free wallpapers, you'll never see a charge at all.`},{q:"Does it work on iPhone and Android?",a:"Yes — both. It also installs as a Progressive Web App on any device with a modern browser, so you get the same experience on a laptop or tablet without going through an app store."},{q:"What happens to my data if I leave?",a:"You can export every event, photo and message any time. If you delete your account, we erase your data within 30 days — no shadow profiles, no trace."},{q:"Is it suitable for churches, sports clubs and schools?",a:"Yes — it was built for them. Faith-inspired by design, with dedicated modules for fixtures, school terms, services, christenings, weddings and funerals."}];function z0(){const[r,d]=F.useState(0);return i.jsx("section",{id:"faq",className:"py-20 sm:py-28 border-t border-border","data-testid":"section-faq",children:i.jsxs("div",{className:"container-page max-w-3xl mx-auto",children:[i.jsxs("div",{className:"text-center mb-12",children:[i.jsx("p",{className:"text-xs font-semibold uppercase tracking-[0.2em] text-muted-foreground mb-3",children:"Frequently asked"}),i.jsxs("h2",{className:"font-serif text-4xl sm:text-5xl font-bold tracking-tight",children:["Anything else ",i.jsx("span",{className:"brand-text",children:"on your mind"}),"?"]}),i.jsxs("p",{className:"mt-4 text-lg text-muted-foreground",children:["Tap a question to expand it. Still stuck? Email"," ",i.jsx("a",{href:"mailto:support@tomorrowsabigday.com",className:"underline underline-offset-4 decoration-2 decoration-[var(--brand)] hover:opacity-80",children:"support@tomorrowsabigday.com"})," ","and a real human will reply."]})]}),i.jsx("div",{className:"space-y-3",children:M0.map((f,u)=>{const b=r===u,k=`faq-panel-${u}`,E=`faq-button-${u}`;return i.jsxs("div",{className:"rounded-2xl border border-border b l terms — no spreadsheet, no copy-paste.",screenshot:"13-school-terms.jpg"},{title:"Meet your calendar",body:"The home screen is your month view. Today is highlighted, upcoming events show as little pills, and the verse of the day greets you at the top.",screenshot:"20-calendar-month.jpg"},{title:"Tap the + to add your first event",body:"Try adding a birthday or anniversary you don't want to forget. The app counts down the days for you and reminds you in advance.",screenshot:"23-create-event.jpg"}],proTip:"Add the app to your home screen first — that lets reminders fire even when your browser is closed."},{slug:"onboarding",title:"Onboarding Walkthrough",tagline:"What every screen of the welcome flow does — and why we ask.",duration:"2 min",icon:Ph,posterScreenshot:"20-calendar-month.jpg",intro:"First-time onboarding is just three taps. We never ask for an email or a password to begin — we only collect what we need to make the calendar useful right away.",steps:[{title:"Welcome screen",body:"A short hello and a single button: Get Started. No popups, no upsells. Tap it and you are in.",screenshot:"01-calendar-light.jpg"},{title:"Choose your country",body:"This sets your public holidays, school terms, and default time zone. You can add more countries later in Settings if your family is spread across borders.",screenshot:"33-school-terms.jpg"},{title:"Pick a language",body:"We support dozens of languages out of the box. The whole interface — buttons, dates, even reminder messages — switches instantly.",screenshot:"10-settings.jpg"},{title:"Allow notifications (recommended)",body:"When the browser asks, tap Allow. This is what lets reminders ping you on the actual day, even if the app is closed.",screenshot:"11-notifications.jpg"},{title:"Land on the calendar",body:"That's it. You are dropped onto the month view with public holidays already plotted. Add your first personal event and you are off.",screenshot:"20-calendar-month.jpg"}],proTip:"Skipped a step? Open Settings — every choice from onboarding can be changed there at any time."},{slug:"free-chat-and-local-time",title:"Free chat & live local time",tagline:"Every chat is free over data — and you can see each member's local time at the top of the room.",duration:"2 min",icon:$h,posterScreenshot:"20-calendar-month.jpg",intro:"Every chat in the app — group rooms for an event, sports squad rooms, the manually-created family thread, and the one-to-one reply thread that comes back from a secure invite — is always free for both sender and receiver and runs over data (Wi-Fi or mobile). On top of that, every chat shows you each member's live local time at the top of the room, so you can tell at a glance whether it's mid-afternoon for them or the middle of the night before you fire off a message. Here is how both perks work.",steps:[{title:"Open any chat",body:"Tap an event chat from the calendar, a thread from the Messages tab, or a sports squad room. The header shows the title, the member count, and a yellow Free badge so you never have to wonder if a particular message will cost anyone anything.",screenshot:"22-upcoming-events.jpg"},{title:"Look just under the title — that is the live time strip",body:"Directly under the chat name you'll see something like '👥 In this chat — Carla 14:32 · Tom 09:15 · You 21:48'. Each name is a member of the chat, each time is their actual local time on their actual phone. The strip re-ticks every minute on its own — no refresh, no setup.",screenshot:"11-notifications.jpg"},{title:"Use it before sending",body:"If Tom shows 03:15, maybe wait until morning. If Carla shows 14:32 you know she's mid-afternoon and probably free. It's the easiest way to keep international family conversations polite without having to do timezone maths in your head.",screenshot:"11-notifications.jpg"},{title:"Hosts see the same thing for invite replies",body:"When a guest replies to a secure invite you sent them, the one-to-one thread that opens in your inbox shows the recipient's local time the same way. So if you're chasing an RSVP at 9 PM your time, you can see at a glance whether they're in your timezone or not before you ping again.",screenshot:"22-upcoming-events.jpg"},{title:"Why it costs nothing",body:"Every message inside the app — text, emoji, photo, anything — is delivered over the data connection your phone is already on, just like the most popular messaging apps in the world. The only carrier fee we ever pay is the very first SMS or email when you invite someone who doesn't yet have the app installed. The moment they install, every message after that switches to free push notifications.",screenshot:"10-settings.jpg"}],proTip:"If you're organising a wedding or a big family event with relatives spread across countries, pin the chat to the top of your Messages tab. The live time strip then sits one tap away — perfect for choosing the right moment to send the morning-of reminder."},{slug:"import-from-other-calendars",title:"Import from another calendar",tagline:"Bring every event across from Google, Apple, Outlook, Yahoo, Eventbrite or Facebook in one tap.",duration:"2 min",icon:Kh,posterScreenshot:"20-calendar-month.jpg",intro:"Switching calendars usually means hours of re-typing — birthdays, anniversaries, work meetings, kids' fixtures, the lot. Tomorrow's a BIG DAY® has a guided import wizard that walks you through exporting your existing events from any major calendar and brings them across in a single tap, with smart reminders pre-set per event type so you don't have to fiddle with each one.",steps:[{title:"Open the import wizard",body:"Brand-new users see it automatically the first time they land on the calendar. Anyone else can tap the Import from another calendar button at the top of the Calendar tab — it's always there, you can come back as many times as you like.",screenshot:"20-calendar-month.jpg"},{title:"Pick where your events live today",body:"Choose your source — Google Calendar, Apple iCloud, Outlook / Office 365, Yahoo Calendar, Eventbrite, or Facebook (via Google Calendar). The wizard adjusts the next step to match.",screenshot:"10-settings.jpg"},{title:"Follow the export instructions",body:"Each provider gets its own short, numbered walkthrough — exactly which menu, which button, which file to download. Most take under a minute. The end result is a single .ics file (the standard calendar format every major service speaks).",screenshot:"10-settings.jpg"},{title:"Set smart reminder defaults — once",body:"Before you import, the wizard shows a table of every event type with sensible defaults pre-filled: birthdays get a one-week-ahead and a day-before nudge, weddings get a month and a week, work meetings get one day. Tweak any of them, switch a whole category off, or just tap Continue to accept the defaults.",screenshot:"11-notifications.jpg"},{title:"Upload the file — done",body:"Pick the .ics file from your downloads. The app classifies every event by type, applies your reminder defaults, and shows you a clean breakdown — for example: 14 birthdays, 8 work meetings, 3 weddings imported. From that moment on, every imported event is treated like it was created in the app from day one — fully editable, deletable, with reminders firing on schedule.",screenshot:"22-upcoming-events.jpg"}],proTip:"Importing from Facebook? Go via Google first — log in to facebook.com/events on a desktop, click Subscribe, paste the URL into Google Calendar, then export from Google. The wizard's Facebook step walks you through it screen by screen."},{slug:"adding-events",title:"Adding Events",tagline:"Birthdays, anniversaries, weddings, exams — anything you don't want to forget.",duration:"2 min",icon:Yy,posterScreenshot:"23-create-event.jpg",intro:"Events are the heart of the app. They can be one-off or annual, public or private, with or without a registry. Here is the fastest path from blank to saved.",steps:[{title:"Tap the yellow + on the bottom bar",body:"It is always within thumb reach, on every screen. The Create Event sheet slides up.",screenshot:"23-create-event.jpg"},{title:"Pick the type",body:"Birthday, anniversary, wedding, exam, deadline, fixture — choose one. The icon and colour are set automatically so the event is easy to spot in the month view.",screenshot:"23-create-event.jpg"},{title:"Set the date (and time, if it matters)",body:"Most events only need a date. For weddings or matches, tap the time field too — reminders will use it to nudge you the right number of hours before.",screenshot:"20-calendar-month.jpg"},{title:"Add a name and any notes",body:"Keep names short — Mom's Birthday, Sarah & James Wedding, Grade 8 Maths Exam. Notes are optional and can hold venue addresses or gift ideas.",screenshot:"22-upcoming-events.jpg"},{title:"Save — and watch it land on the calendar",body:"The event appears immediately on the right day, with a count-down on the Upcoming list. You're done.",screenshot:"22-upcoming-events.jpg"}],proTip:"Add Repeats Yearly for birthdays and anniversaries — it never asks you again, year after year."},{slug:"reminders",title:"Reminders",tagline:"Never miss the day — or the lead-up.",duration:"2 min",icon:Gh,posterScreenshot:"11-notifications.jpg",intro:"The whole point of the app is that you remember. Reminders are smart by default but fully customisable — set as many as you like per event.",steps:[{title:"Open any event",body:"Tap an event from the calendar or the Upcoming list to see its detail page.",screenshot:"22-upcoming-events.jpg"},{title:"Find the Reminders section",body:"Scroll down. You'll see the default reminder (one day before) plus a button to add more.",screenshot:"11-notifications.jpg"},{title:"Choose how far ahead",body:"Pick from one week, three days, one day, the morning of, or one hour before. Add several — they all fire at the right moment.",screenshot:"11-notifications.jpg"},{title:"Make sure notifications are on",body:"If your phone never pings, go to Settings → Notifications inside the app and check the toggle is green. Your phone's system settings also need to allow notifications for the browser.",screenshot:"10-settings.jpg"}],proTip:"For weddings and big trips, set three reminders: one week, one day, and one hour before. Belt, braces, and a parachute."},{slug:"invitation-wallpapers",title:"Invitation Wallpapers & Skins",tagline:"Make every invite look like the event itself — no design skills needed.",duration:"2 min",icon:db,posterScreenshot:"25-themed-backgrounds.jpg",intro:"An invitation feels personal when it looks personal. Every event in the app can be dressed up with a themed wallpaper or your own photo — and the design carries through to the invite your guests receive.",steps:[{title:"Open the event you want to dress up",body:"Tap any event from the calendar or the Upcoming list. On the detail page, look for the Background or Wallpaper button — usually right under the event title.",screenshot:"22-upcoming-events.jpg"},{title:"Pick a themed background",body:"We ship a curated library — birthdays, weddings, baby showers, sports days, exam season, religious holidays, more. Tap one and the event preview updates instantly so you can see the look before you commit.",screenshot:"25-themed-backgrounds.jpg"},{title:"Or upload your own photo",body:"Tap Upload from gallery to use a family photo, an engagement shot, or a snap of the venue. The app crops it for you and overlays the event title in our gold script so it always reads cleanly.",screenshot:"24-background-picker.jpg"},{title:"Try the AI wallpaper generator (optional)",body:"Tap Generate with AI, type a short prompt — for example, 'soft pastel watercolour roses for a 60th birthday' — and the app produces a one-of-one background just for that event. You can re-roll until you love it.",screenshot:"34-ai-wallpaper.jpg"},{title:"Save — your guests see it too",body:"Once saved, every invite link you send for this event opens with that wallpaper. The invite, the calendar tile, and your phone's lock-screen background all match.",screenshot:"21-calendar-art.jpg"}],proTip:"For weddings or milestone birthdays, set the wallpaper a few weeks before the event — every time you open the app, that countdown gets to feel like the real thing."},{slug:"sending-gifts",title:"Sending & Receiving Gifts via Invites",tagline:"Every invite carries a wishlist — guests can gift in two taps, hosts see who sent what.",duration:"3 min",icon:cb,posterScreenshot:"26-registry-links.jpg",intro:"When you receive an invite from inside the app, you don't just see the date and time — you see the host's gift registry too. Pick something, pay through the partner store, and the host gets a clean thank-you list. No awkward 'what did you get?' messages.",steps:[{title:"Open the invite a friend sent you",body:"Tap the invite link from your messages. It opens straight inside the app on the event page — date, venue, dress code, and the gift registry all on one screen.",screenshot:"22-upcoming-events.jpg"},{title:"Scroll to Gift Ideas",body:"The host's wishlist sits below the event details. Each item shows a photo, the partner store, and the price. Items already bought are marked so you don't double up.",screenshot:"26-registry-links.jpg"},{title:"Tap an item to send it",body:"The partner store opens inside the app — you check out exactly the way you would on their normal site. Address, payment, gift message, all there.",screenshot:"31-shop-registries.jpg"},{title:"Add a personal note",body:"Before you confirm, the app gives you a short note field — 'Happy birthday from the Smiths', 'Wishing you both a lifetime of joy'. Your message lands with the gift.",screenshot:"35-shop-overview.jpg"},{title:"The host sees it instantly",body:"Your name moves from the registry to the host's Thank-You list with the item next to it. They never have to wonder which Aunty sent the kettle.",screenshot:"22-upcoming-events.jpg"},{title:"For hosts: thank guests in one tap",body:"Open the event, tap Thank-You list, and the app drafts a personalised note per guest with the gift name pre-filled. Send by SMS or in-app chat — done in five minutes.",screenshot:"11-notifications.jpg"}],proTip:"Hosts: pin two or three lower-priced items at the top of your registry. Guests who weren't planning to bring a gift often grab something small when the option is there in the invite — and never feel awkward about it."},{slug:"gift-registry",title:"Gift Registry",tagline:"Attach a wishlist to any event so guests know what to buy.",duration:"2 min",icon:$o,posterScreenshot:"26-registry-links.jpg",intro:"Birthdays and weddings are easier when guests know what you actually want. The registry feature lets you attach links from any partner store directly to an event.",steps:[{title:"Open the event you want to add a registry to",body:"Birthdays, weddings, baby showers — any event type can carry a registry.",screenshot:"23-create-event.jpg"},{title:"Scroll to Gift Registry and tap Add Link",body:"Paste a link from any of our partner stores. The app pulls the product name, image, and price automatically.",screenshot:"26-registry-links.jpg"},{title:"Add as many items as you like",body:"Mix stores, mix price points. Mark essentials as priority so guests know what matters most.",screenshot:"31-shop-registries.jpg"},{title:"Share the event with your guests",body:"When guests open the invite, they see the full registry and can mark items as bought so nothing gets duplicated.",screenshot:"22-upcoming-events.jpg"}],proTip:"Add a price range across the registry — a R200 mug, a R2,000 kettle, a R20,000 dishwasher. Guests with any budget can contribute."},{slug:"rsvp-management",title:"RSVP Management",tagline:"See who's coming, who's bringing what, and who hasn't replied yet.",duration:"2 min",icon:pi,posterScreenshot:"22-upcoming-events.jpg",intro:"Sending a group invite shouldn't mean chasing replies in seven different chats. Built-in RSVPs let guests respond with one tap and you see the running tally live.",steps:[{title:"Create an event and tap Invite Guests",body:"On the create or edit event screen, scroll to Guest List and add names. You can paste a list of phone numbers or pick from contacts.",screenshot:"23-create-event.jpg"},{title:"Send the invite",body:"Each guest gets a unique link by SMS or share-sheet. Tapping it opens a clean invite page — no app install required for them.",screenshot:"22-upcoming-events.jpg"},{title:"Track responses live",body:"Open the event again. You see Going, Not Going, Maybe, and No Reply at a glance. Tap any name to see when they responded.",screenshot:"22-upcoming-events.jpg"},{title:"Send a reminder to the no-replies",body:"One tap re-pings only the guests who haven't responded. Perfect three days before the event.",screenshot:"11-notifications.jpg"}],proTip:"Add a What to bring line in the event notes — guests see it right above the RSVP buttons."},{slug:"sports-fixtures",title:"Sports & Fixtures",tagline:"Every match, every tournament, every kid on every team.",duration:"2 min",icon:em,posterScreenshot:"30-sports-fixtures.jpg",intro:"Built for parents juggling rugby, hockey, swimming, and chess on the same Saturday. Add a team once, the fixtures populate automatically.",steps:[{title:"Open the Sports tab",body:"Tap the trophy icon on the bottom bar.",screenshot:"06-sports.jpg"},{title:"Add a team or athlete",body:"Enter the team name (e.g. Grade 5A Rugby) and the player. You can add as many as you have kids and codes.",screenshot:"30-sports-fixtures.jpg"},{title:"Add fixtures",body:"Type the opponent, date, time, and venue. Or paste a season schedule and let the app split it into individual fixtures.",screenshot:"30-sports-fixtures.jpg"},{title:"Get reminders the night before",body:"Each fixture pings you the evening before with the kit colour, kick-off time, and venue address.",screenshot:"11-notifications.jpg"}],proTip:"Tag fixtures with Home or Away — the app pre-fills the venue when you add a Home fixture."},{slug:"multi-country-calendars",title:"Multi-Country Calendars",tagline:"Family in three countries? See every public holiday at once.",duration:"1 min",icon:Zh,posterScreenshot:"33-school-terms.jpg",intro:"If your in-laws are in the UK, your kids are at school in South Africa, and you work for a US company, you need every set of holidays in one place. Here's how.",steps:[{title:"Open Settings",body:"Tap the gear icon on the bottom bar.",screenshot:"10-settings.jpg"},{title:"Find Countries",body:"Scroll to the Countries section. Your home country is already there.",screenshot:"33-school-terms.jpg"},{title:"Add as many as you need",body:"Tap + and pick another country. Repeat for each. Each country shows up as a coloured chip on the calendar.",screenshot:"13-school-terms.jpg"},{title:"Filter on the calendar",body:"Back on the month view, tap a country chip to hide or show its holidays. Useful when only one branch of the family is travelling.",screenshot:"20-calendar-month.jpg"}],proTip:"Each country comes with its own school terms too — switch the term overlay on in Settings to see them."},{slug:"in-app-shopping",title:"In-App Shopping",tagline:"Browse partner stores without ever leaving the app.",duration:"2 min",icon:Fh,posterScreenshot:"35-shop-overview.jpg",intro:"The Shop tab is curated — only stores we trust to deliver, only categories that match the moments you're celebrating.",steps:[{title:"Tap the Shop icon",body:"Bottom bar, gift box icon. The Shop overview opens.",screenshot:"35-shop-overview.jpg"},{title:"Browse by category or by partner",body:"Pick from gift cards, flowers, hampers, experiences — or jump straight to a partner store you already know.",screenshot:"36-shop-partners.jpg"},{title:"Add an item to a registry",body:"Tap the heart on any product. Choose which event's registry to add it to. Done.",screenshot:"31-shop-registries.jpg"},{title:"Check out (or let your guests do it)",body:"Buy it for yourself, or share the registry link so guests can buy it for you. Payment runs th
