workflows:
  ios-release:
    name: TABD iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - default
      xcode: "26"
    scripts:
      - name: npm install
        script: npm install --legacy-peer-deps
      - name: pod install
        script: cd ios/App && pod install
      - name: set up signing
        script: |
          set -ex
          keychain initialize
          base64 -D -i ios/App/signing/cert.b64 -o /tmp/cert.p12
          security import /tmp/cert.p12 -k ~/Library/Keychains/login.keychain -P "Tabd2026!" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/login.keychain
          base64 -D -i ios/App/signing/profile.b64 -o /tmp/profile.mobileprovision
          UUID=$(python3 -c "import subprocess,plistlib; d=subprocess.run(['security','cms','-D','-i','/tmp/profile.mobileprovision'],capture_output=True); p=plistlib.loads(d.stdout); print(p['UUID'])")
          echo "UUID=$UUID"
          [ -n "$UUID" ] || (echo "FAILED to extract UUID" && exit 1)
          echo "$UUID" > /tmp/signing_uuid.txt
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          sed -i '' "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g" ios/App/App.xcodeproj/project.pbxproj
          printf '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store-connect</string><key>signingStyle</key><string>manual</string><key>provisioningProfiles</key><dict><key>COM.TOMORROWSABIGDAY.APP</key><string>%s</string></dict><key>teamID</key><string>J92KZ2V8C2</string></dict></plist>' "$UUID" > /tmp/export_opts.plist
      - name: build number
        script: |
          BUILD_NUM=$(( $(git rev-list --count HEAD) + 200 ))
          echo "Setting build number: $BUILD_NUM"
          cd ios/App && agvtool new-marketing-version 2.5.6 && agvtool new-version -all $BUILD_NUM
      - name: archive
        script: |
          UUID=$(cat /tmp/signing_uuid.txt)
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=J92KZ2V8C2 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$UUID" \
            archive
      - name: export ipa
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportPath $CM_BUILD_DIR/ipa \
            -exportOptionsPlist /tmp/export_opts.plist
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release v2.5.6 (build 43)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - default
      vars:
        PACKAGE_NAME: "com.tomorrowsabigday.app"
      node: 22
      java: 17
      android_signing:
        - tomorrows-bigday
    scripts:
      - name: Create generated gradle file
        script: |
          mkdir -p android/capacitor-cordova-android-plugins
          printf '// DO NOT EDIT THIS FILE\next {\n  cdvMinSdkVersion = 22\n  cdvPluginPostBuildExtras = []\n  cordovaConfig = [:]\n}\n' > android/capacitor-cordova-android-plugins/cordova.variables.gradle

      - name: Build release AAB
        script: |
          set -ex
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -PversionCode=43 \
            -PversionName=2.5.6 \
            --stacktrace
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "AAB: $AAB"
          ls -la app/build/outputs/bundle/release/
          unzip -p "$AAB" AndroidManifest.xml 2>/dev/null | strings | grep -o 'versionCode=[0-9]*' || true

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - snel0608@gmail.com
        notify:
          success: true
          failure: true
